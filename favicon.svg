<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App-icon background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Inner highlight rim -->
  <rect x="1" y="1" width="30" height="30" rx="7.2"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>

  <!-- Shield body (white) -->
  <path d="M16 4.5L7.5 8.2v6.8C7.5 21 11 26.5 16 28.5C21 26.5 24.5 21 24.5 15V8.2L16 4.5Z"
        fill="white" opacity="0.95" filter="url(#glow)"/>

  <!-- Left antenna -->
  <line x1="13" y1="11.8" x2="11.2" y2="9.2" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="10.8" cy="8.8" r="1.1" fill="#047857"/>

  <!-- Right antenna -->
  <line x1="19" y1="11.8" x2="20.8" y2="9.2" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="21.2" cy="8.8" r="1.1" fill="#047857"/>

  <!-- Android eyes -->
  <circle cx="13.5" cy="16" r="1.6" fill="#059669"/>
  <circle cx="18.5" cy="16" r="1.6" fill="#059669"/>

  <!-- Smile arc -->
  <path d="M13 20 Q16 22 19 20" fill="none" stroke="#059669" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Shield top highlight -->
  <path d="M16 6L8.8 9.2v5.5" fill="none"
        stroke="rgba(255,255,255,0.38)" stroke-width="0.9" stroke-linecap="round"/>
</svg>
